name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Test server (strict)
        shell: bash
        run: |
          set -euo pipefail
          npm run test:server 2>&1 | tee /tmp/test-server.log
          if grep -Eiq '\b(warn(ing)?|deprecated)\b' /tmp/test-server.log; then
            echo "Disallowed warning/deprecation output detected in server tests."
            exit 1
          fi

      - name: Test client (strict)
        shell: bash
        run: |
          set -euo pipefail
          npm run test:client 2>&1 | tee /tmp/test-client.log
          if grep -Eiq '\b(warn(ing)?|deprecated)\b' /tmp/test-client.log; then
            echo "Disallowed warning/deprecation output detected in client tests."
            exit 1
          fi

      - name: Test renderer (strict)
        shell: bash
        run: |
          set -euo pipefail
          npm run test:renderer --workspace=client 2>&1 | tee /tmp/test-renderer.log
          if grep -Eiq '\b(warn(ing)?|deprecated)\b' /tmp/test-renderer.log; then
            echo "Disallowed warning/deprecation output detected in renderer tests."
            exit 1
          fi
