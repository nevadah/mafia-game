<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Mafia Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; }
    h1 { color: #e94560; margin-bottom: 1.5rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #aaa; }
    input { width: 100%; padding: 0.5rem; border: 1px solid #0f3460; border-radius: 4px;
            background: #0f3460; color: #eee; margin-bottom: 0.75rem; }
    button { padding: 0.5rem 1.25rem; border: none; border-radius: 4px; cursor: pointer;
             background: #e94560; color: #fff; font-weight: 600; margin-right: 0.5rem; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { font-size: 0.875rem; color: #aaa; margin-top: 0.5rem; }
    #state-view { white-space: pre-wrap; font-family: monospace; font-size: 0.8rem;
                  color: #a0e4b0; max-height: 400px; overflow-y: auto; }
    .players { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .player { background: #0f3460; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.85rem; }
    .player.dead { opacity: 0.4; text-decoration: line-through; }
    .phase { font-size: 1.25rem; font-weight: 700; color: #e94560; text-transform: uppercase; }
  </style>
</head>
<body>
  <h1>🔍 Mafia Game</h1>

  <div class="card" id="connect-panel">
    <label>Server URL</label>
    <input id="server-url" value="http://localhost:3000" />
    <label>Your Name</label>
    <input id="player-name" placeholder="Enter your name" />
    <label>Game ID (to join existing)</label>
    <input id="game-id" placeholder="Leave blank to create new game" />
    <button id="btn-create">Create Game</button>
    <button id="btn-join">Join Game</button>
    <div id="status">Not connected</div>
  </div>

  <div class="card" id="game-panel" style="display:none">
    <div class="phase" id="phase-display">—</div>
    <p id="round-display" style="margin: 0.5rem 0; color:#aaa"></p>
    <div class="players" id="players-list"></div>
    <br/>
    <button id="btn-refresh">Refresh State</button>
    <button id="btn-disconnect">Disconnect</button>
  </div>

  <div class="card" id="raw-panel" style="display:none">
    <strong>Raw Game State</strong>
    <pre id="state-view"></pre>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
