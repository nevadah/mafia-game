<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Mafia Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; }
    h1 { color: #e94560; margin-bottom: 1rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #aaa; }
    input, select { width: 100%; padding: 0.5rem; border: 1px solid #0f3460; border-radius: 4px;
            background: #0f3460; color: #eee; margin-bottom: 0.75rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer;
             background: #e94560; color: #fff; font-weight: 600; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { font-size: 0.875rem; color: #aaa; margin-top: 0.5rem; }
    #state-view { white-space: pre-wrap; font-family: monospace; font-size: 0.8rem;
                  color: #a0e4b0; max-height: 360px; overflow-y: auto; }
    .players { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .player { background: #0f3460; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.85rem; }
    .player.dead { opacity: 0.4; text-decoration: line-through; }
    .phase { font-size: 1.25rem; font-weight: 700; color: #e94560; text-transform: uppercase; }
    .meta { color: #aaa; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Mafia Game</h1>

  <div class="card" id="connect-panel">
    <label>Server URL</label>
    <input id="server-url" value="http://localhost:3000" />
    <label>Your Name</label>
    <input id="player-name" placeholder="Enter your name" />
    <label>Game ID (to join existing)</label>
    <input id="game-id" placeholder="Leave blank to create new game" />
    <div class="controls">
      <button id="btn-create">Create Game</button>
      <button id="btn-join">Join Game</button>
      <button id="btn-list">List Waiting Games</button>
    </div>
    <div id="status">Not connected</div>
  </div>

  <div class="card" id="game-panel" style="display:none">
    <div class="phase" id="phase-display">-</div>
    <p id="round-display" class="meta"></p>
    <p id="me-display" class="meta"></p>
    <div class="players" id="players-list"></div>

    <div class="row" style="margin-top: 1rem;">
      <div>
        <label>Target</label>
        <select id="target-select"></select>
      </div>
      <div>
        <label>
          <input type="checkbox" id="force-resolve" style="width:auto; margin-right:0.5rem;" />
          Force resolve (host)
        </label>
      </div>
    </div>

    <div class="controls">
      <button id="btn-ready">Ready</button>
      <button id="btn-unready">Unready</button>
      <button id="btn-start">Start</button>
      <button id="btn-vote">Vote</button>
      <button id="btn-night">Night Action</button>
      <button id="btn-resolve-day">Resolve Day</button>
      <button id="btn-resolve-night">Resolve Night</button>
      <button id="btn-refresh">Refresh</button>
      <button id="btn-leave">Leave Game</button>
      <button id="btn-disconnect">Disconnect</button>
    </div>
  </div>

  <div class="card" id="raw-panel" style="display:none">
    <strong>Raw Game State</strong>
    <pre id="state-view"></pre>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
